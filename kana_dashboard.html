<html lang="en">
<head>
<script src="auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kana Score Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            color: #333;
            padding: 24px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #2b6cb0; font-size: 2em; margin-bottom: 6px; }
        .subtitle { color: #666; margin-bottom: 28px; font-size: 1em; }
        nav { margin-bottom: 24px; }
        nav a {
            display: inline-block;
            padding: 8px 14px;
            background: #2b6cb0;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9em;
        }
        nav a:hover { background: #4299e1; }

        /* Legend */
        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            background: white;
            padding: 14px 18px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.88em;
            font-weight: 500;
        }
        .dot {
            width: 13px; height: 13px; border-radius: 50%;
        }
        .dot.green  { background: #48bb78; }
        .dot.amber  { background: #ecc94b; }
        .dot.red    { background: #fc8181; }
        .dot.blue   { background: #63b3ed; }
        .dot.grey   { background: #cbd5e0; }

        /* Summary stats */
        .stats {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 14px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-align: center;
            min-width: 100px;
        }
        .stat-card .num { font-size: 1.8em; font-weight: 700; }
        .stat-card .lbl { font-size: 0.78em; color: #666; margin-top: 2px; }
        .stat-card.green .num { color: #48bb78; }
        .stat-card.amber .num { color: #d69e2e; }
        .stat-card.red   .num { color: #e53e3e; }
        .stat-card.blue  .num { color: #3182ce; }

        /* Section header */
        .section-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #2b6cb0;
            margin: 20px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid #bee3f8;
        }

        /* Kana grid */
        .kana-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
            gap: 8px;
            margin-bottom: 24px;
        }
        .kana-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 6px 14px;
            border-radius: 8px;
            position: relative;
            min-height: 70px;
            cursor: default;
            transition: transform 0.15s;
        }
        .kana-cell:hover { transform: scale(1.06); }
        .kana-char { font-size: 1.7rem; font-weight: 600; line-height: 1; }
        .kana-rom  { font-size: 0.62rem; font-weight: 500; margin-top: 3px; color: #555; }

        /* Streak pips */
        .pips {
            position: absolute;
            bottom: 4px;
            display: flex;
            gap: 2px;
        }
        .pip {
            width: 4px; height: 4px; border-radius: 50%; background: #cbd5e0;
        }
        .pip.filled { background: #4a5568; }

        /* Cell status colours */
        .kana-cell.green { background: linear-gradient(135deg,#f0fff4,#c6f6d5); border: 2px solid #48bb78; }
        .kana-cell.amber { background: linear-gradient(135deg,#fffff0,#fefcbf); border: 2px solid #ecc94b; }
        .kana-cell.red   { background: linear-gradient(135deg,#fff5f5,#fed7d7); border: 2px solid #fc8181; }
        .kana-cell.blue  { background: linear-gradient(135deg,#ebf8ff,#bee3f8); border: 2px solid #63b3ed; }
        .kana-cell.grey  { background: #f7fafc; border: 2px solid #e2e8f0; opacity: 0.5; }

        /* Updated timestamp */
        .updated { font-size: 0.8em; color: #999; margin-top: 30px; text-align: right; }
    </style>
</head>

function makePips(streak, needed) {
  let html = '';
  for (let i = 0; i < needed; i++) {
    html += `<span class="pip${i < streak ? ' filled' : ''}"></span>`;
  }
  return html;
}

function buildGrid(containerId, list, scores) {
  const grid = document.getElementById(containerId);
  if (!list.length) {
    grid.innerHTML = '<p style="color:#999;font-size:0.9em;padding:8px 0">Not started yet</p>';
    return;
  }
  list.forEach(({c, r}) => {
    const entry = scores[c] || {s:'grey', k:0};
    const status = entry.s;
    const streak = entry.k || 0;
    const needed = (status === 'red') ? 5 : (status === 'amber') ? 5 : 0;
    const cell = document.createElement('div');
    cell.className = `kana-cell ${status}`;
    cell.title = `${c} (${r}) — ${status}${streak > 0 ? ', streak: ' + streak : ''}`;
    cell.innerHTML = `
      <span class="kana-char">${c}</span>
      <span class="kana-rom">${r}</span>
      ${needed > 0 ? `<div class="pips">${makePips(streak, needed)}</div>` : ''}
    `;
    grid.appendChild(cell);
  });
}
