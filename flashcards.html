<!DOCTYPE html>
<html lang="en">
<head>
<script src="auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - Japanese Study Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Navigation */
        nav {
            margin-bottom: 30px;
        }

        nav a {
            display: inline-block;
            padding: 10px 16px;
            background-color: #9b2c2c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        nav a:hover {
            background-color: #c53030;
        }

        /* Page Header */
        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            color: #9b2c2c;
            font-size: 2.5em;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #666;
            font-size: 1.1em;
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 24px;
            border: 2px solid #9b2c2c;
            background: white;
            color: #9b2c2c;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: #9b2c2c;
            color: white;
        }

        .mode-btn:hover:not(.active) {
            background: #fff5f5;
        }

        /* Filter Bar */
        .filter-bar {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .filter-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            background: linear-gradient(135deg, #9b2c2c 0%, #e53e3e 100%);
            color: white;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            font-size: 1.05em;
        }

        .filter-header:hover {
            opacity: 0.95;
        }

        .filter-header .toggle-arrow {
            font-size: 1.2em;
            min-width: 20px;
        }

        .filter-body {
            padding: 20px;
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        .filter-body.collapsed {
            max-height: 0;
            padding: 0 20px;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-group-label {
            font-weight: 600;
            color: #9b2c2c;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            background: #fff5f5;
            border: 1px solid #feb2b2;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
            user-select: none;
        }

        .chip:hover {
            background: #fed7d7;
        }

        .chip input[type="checkbox"] {
            accent-color: #9b2c2c;
        }

        /* Card Count Filter */
        .count-filter {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .count-btn {
            padding: 5px 14px;
            border: 1px solid #cbd5e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .count-btn.active {
            background: #9b2c2c;
            color: white;
            border-color: #9b2c2c;
        }

        .count-btn:hover:not(.active) {
            background: #edf2f7;
        }

        .custom-count {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .custom-count input {
            width: 60px;
            padding: 5px 8px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.9em;
            text-align: center;
        }

        /* Select All / Deselect All */
        .filter-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .filter-action-btn {
            padding: 4px 10px;
            border: 1px solid #cbd5e0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            color: #666;
        }

        .filter-action-btn:hover {
            background: #edf2f7;
        }

        /* Go Button */
        .go-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #9b2c2c 0%, #e53e3e 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: opacity 0.2s ease;
        }

        .go-btn:hover {
            opacity: 0.9;
        }

        /* ========= FLIP MODE ========= */
        .flip-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .flip-card-wrapper {
            perspective: 800px;
            cursor: pointer;
        }

        .flip-card {
            width: 100%;
            aspect-ratio: 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .flip-card.flipped {
            transform: rotateY(180deg);
        }

        .flip-front, .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .flip-front {
            background: white;
        }

        .flip-back {
            background: linear-gradient(135deg, #9b2c2c 0%, #e53e3e 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .flip-front .jp-text {
            font-weight: 700;
            line-height: 1.2;
        }

        .flip-front .reading-text {
            font-size: 0.7em;
            color: #999;
            margin-top: 4px;
        }

        .flip-back .en-text {
            font-weight: 600;
            line-height: 1.3;
        }

        .flip-back .reading-text {
            font-size: 0.75em;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* Emoji styling */
        .flip-front .card-emoji {
            font-size: 1.5em;
            margin-top: 4px;
            line-height: 1;
        }

        .single-card-container .card-emoji {
            font-size: 2em;
            margin-top: 8px;
            line-height: 1;
        }

        /* ========= SINGLE CARD VIEW ========= */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-top: 16px;
            margin-bottom: 4px;
        }

        .view-btn {
            padding: 8px 20px;
            border: 2px solid #9b2c2c;
            background: white;
            color: #9b2c2c;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .view-btn:first-child {
            border-radius: 8px 0 0 8px;
        }

        .view-btn:last-child {
            border-radius: 0 8px 8px 0;
            border-left: none;
        }

        .view-btn.active {
            background: #9b2c2c;
            color: white;
        }

        .single-card-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }

        .nav-arrow {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #9b2c2c;
            background: white;
            color: #9b2c2c;
            font-size: 1.5em;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .nav-arrow:hover {
            background: #9b2c2c;
            color: white;
        }

        .nav-arrow:disabled {
            opacity: 0.3;
            cursor: default;
            background: white;
            color: #9b2c2c;
        }

        .single-card-container {
            perspective: 800px;
            cursor: pointer;
            width: 280px;
            height: 280px;
        }

        .single-card-container .flip-card {
            width: 100%;
            height: 100%;
            aspect-ratio: auto;
        }

        .single-card-container .flip-front,
        .single-card-container .flip-back {
            padding: 20px;
        }

        .single-card-container .jp-text {
            font-size: 3.5em;
            font-weight: 700;
            line-height: 1.2;
        }

        .single-card-container .reading-text {
            font-size: 1em;
            margin-top: 8px;
        }

        .single-card-container .en-text {
            font-size: 1.6em;
            font-weight: 600;
            line-height: 1.3;
        }

        .single-card-counter {
            text-align: center;
            margin-top: 12px;
            color: #666;
            font-size: 0.95em;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .single-card-container {
                width: 220px;
                height: 220px;
            }
            .single-card-container .jp-text {
                font-size: 2.5em;
            }
            .single-card-container .en-text {
                font-size: 1.3em;
            }
            .nav-arrow {
                width: 40px;
                height: 40px;
                font-size: 1.2em;
            }
        }

        /* ========= QUIZ MODE ========= */
        .quiz-area {
            margin-top: 20px;
        }

        .quiz-progress-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .quiz-progress-track {
            flex: 1;
            height: 10px;
            background: #e0e7f1;
            border-radius: 5px;
            overflow: hidden;
        }

        .quiz-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #9b2c2c, #e53e3e);
            transition: width 0.3s ease;
            border-radius: 5px;
        }

        .quiz-progress-text {
            font-weight: 600;
            color: #666;
            font-size: 0.95em;
            white-space: nowrap;
        }

        .quiz-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }

        .quiz-prompt {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .quiz-reading {
            font-size: 1.1em;
            color: #999;
            margin-bottom: 25px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .quiz-option {
            padding: 14px;
            border: 2px solid #e0e7f1;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            background: white;
            transition: all 0.2s ease;
        }

        .quiz-option:hover:not(.disabled) {
            border-color: #9b2c2c;
            background: #fff5f5;
        }

        .quiz-option.correct {
            border-color: #276749;
            background: #f0fff4;
            color: #276749;
            font-weight: 600;
        }

        .quiz-option.wrong {
            border-color: #c53030;
            background: #fff5f5;
            color: #c53030;
        }

        .quiz-option.disabled {
            cursor: default;
            opacity: 0.7;
        }

        /* Score indicators on quiz card */
        .score-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 12px;
            font-size: 0.85em;
        }

        .score-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .score-dot.green { background: #276749; }
        .score-dot.amber { background: #d69e2e; }
        .score-dot.red { background: #c53030; }

        .fire-badge {
            color: #9b2c2c;
            font-size: 0.85em;
            font-weight: 700;
        }

        /* Quiz Summary */
        .quiz-summary {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
        }

        .quiz-summary h2 {
            font-size: 1.8em;
            color: #9b2c2c;
            margin-bottom: 20px;
        }

        .summary-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .stat-correct .stat-number { color: #276749; }
        .stat-wrong .stat-number { color: #c53030; }
        .stat-percent .stat-number { color: #9b2c2c; }

        .summary-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #9b2c2c 0%, #e53e3e 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }

        .summary-btn:hover {
            opacity: 0.9;
        }

        .summary-btn.secondary {
            background: white;
            color: #9b2c2c;
            border: 2px solid #9b2c2c;
        }

        /* Type-in answer */
        .quiz-type-area {
            max-width: 400px;
            margin: 0 auto;
        }

        .quiz-type-label {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .quiz-type-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e7f1;
            border-radius: 8px;
            font-size: 1.1em;
            text-align: center;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .quiz-type-input:focus {
            border-color: #9b2c2c;
        }

        .quiz-type-input.correct {
            border-color: #276749;
            background: #f0fff4;
            color: #276749;
        }

        .quiz-type-input.wrong {
            border-color: #c53030;
            background: #fff5f5;
            color: #c53030;
        }

        .quiz-submit-btn {
            margin-top: 12px;
            padding: 10px 30px;
            background: linear-gradient(135deg, #9b2c2c 0%, #e53e3e 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
        }

        .quiz-submit-btn:hover {
            opacity: 0.9;
        }

        .quiz-correct-answer {
            margin-top: 10px;
            font-size: 1em;
            color: #276749;
            font-weight: 600;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2em;
            }
            .flip-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .quiz-prompt {
                font-size: 2em;
            }
            .quiz-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="cloud_sync.js"></script>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav>
            <a href="index.html">← Home</a>
        </nav>

        <!-- Page Header -->
        <div class="page-header">
            <h1>Flashcards 🃏</h1>
            <p>Practice kana and vocabulary with flip cards or quiz mode</p>
        </div>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('flip')">Flip Cards</button>
            <button class="mode-btn" onclick="setMode('quiz')">Quiz Mode</button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-header" onclick="toggleFilters()">
                <span class="toggle-arrow" id="filter-arrow">▼</span>
                <span>Filters & Settings</span>
            </div>
            <div class="filter-body" id="filter-body">
            <div class="filter-actions">
                <button class="filter-action-btn" onclick="selectAll()">Select All</button>
                <button class="filter-action-btn" onclick="deselectAll()">Deselect All</button>
            </div>

            <div class="filter-group">
                <div class="filter-group-label">Hiragana</div>
                <div class="filter-chips">
                    <label class="chip"><input type="checkbox" value="a_row" checked> あ行</label>
                    <label class="chip"><input type="checkbox" value="ka_row" checked> か行</label>
                    <label class="chip"><input type="checkbox" value="sa_row" checked> さ行</label>
                    <label class="chip"><input type="checkbox" value="ta_row" checked> た行</label>
                    <label class="chip"><input type="checkbox" value="na_row" checked> な行</label>
                    <label class="chip"><input type="checkbox" value="ha_row"> は行</label>
                    <label class="chip"><input type="checkbox" value="ma_row"> ま行</label>
                    <label class="chip"><input type="checkbox" value="ya_row"> や行</label>
                    <label class="chip"><input type="checkbox" value="ra_row"> ら行</label>
                    <label class="chip"><input type="checkbox" value="wa_row"> わ行</label>
                    <label class="chip"><input type="checkbox" value="dakuten" checked> Dakuten (が行)</label>
                    <label class="chip"><input type="checkbox" value="h_za_row"> ざ行</label>
                    <label class="chip"><input type="checkbox" value="h_da_row"> だ行</label>
                    <label class="chip"><input type="checkbox" value="h_ba_row"> ば行</label>
                    <label class="chip"><input type="checkbox" value="h_pa_row"> ぱ行</label>
                    <label class="chip"><input type="checkbox" value="combos"> Combos</label>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-group-label">Katakana</div>
                <div class="filter-chips">
                    <label class="chip"><input type="checkbox" value="k_a_row"> ア行</label>
                    <label class="chip"><input type="checkbox" value="k_ka_row"> カ行</label>
                    <label class="chip"><input type="checkbox" value="k_sa_row"> サ行</label>
                    <label class="chip"><input type="checkbox" value="k_ta_row"> タ行</label>
                    <label class="chip"><input type="checkbox" value="k_na_row"> ナ行</label>
                    <label class="chip"><input type="checkbox" value="k_ha_row"> ハ行</label>
                    <label class="chip"><input type="checkbox" value="k_ma_row"> マ行</label>
                    <label class="chip"><input type="checkbox" value="k_ya_row"> ヤ行</label>
                    <label class="chip"><input type="checkbox" value="k_ra_row"> ラ行</label>
                    <label class="chip"><input type="checkbox" value="k_wa_row"> ワ行</label>
                    <label class="chip"><input type="checkbox" value="k_ga_row"> ガ行</label>
                    <label class="chip"><input type="checkbox" value="k_za_row"> ザ行</label>
                    <label class="chip"><input type="checkbox" value="k_da_row"> ダ行</label>
                    <label class="chip"><input type="checkbox" value="k_ba_row"> バ行</label>
                    <label class="chip"><input type="checkbox" value="k_pa_row"> パ行</label>
                    <label class="chip"><input type="checkbox" value="k_combos"> Combos</label>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-group-label">Kanji</div>
                <div class="filter-chips">
                    <label class="chip"><input type="checkbox" value="kanji_numbers"> Numbers (15)</label>
                    <label class="chip"><input type="checkbox" value="kanji_time"> Time (16)</label>
                    <label class="chip"><input type="checkbox" value="kanji_people"> People & Body (14)</label>
                    <label class="chip"><input type="checkbox" value="kanji_nature"> Nature (18)</label>
                    <label class="chip"><input type="checkbox" value="kanji_places"> Places (10)</label>
                    <label class="chip"><input type="checkbox" value="kanji_actions"> Actions (10)</label>
                    <label class="chip"><input type="checkbox" value="kanji_adjectives"> Adjectives (17)</label>
                    <label class="chip"><input type="checkbox" value="kanji_abstract"> Abstract (6)</label>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-group-label">Vocabulary by Chapter</div>
                <div class="filter-chips">
                <label class="chip"><input type="checkbox" value="ch1"> Ch. 1 (70)</label>
                <label class="chip"><input type="checkbox" value="ch2"> Ch. 2 (81)</label>
                <label class="chip"><input type="checkbox" value="ch3"> Ch. 3 (71)</label>
                <label class="chip"><input type="checkbox" value="ch4"> Ch. 4 (85)</label>
                <label class="chip"><input type="checkbox" value="ch5"> Ch. 5 (56)</label>
                <label class="chip"><input type="checkbox" value="ch6"> Ch. 6 (49)</label>
                <label class="chip"><input type="checkbox" value="ch7"> Ch. 7 (57)</label>
                <label class="chip"><input type="checkbox" value="ch8"> Ch. 8 (67)</label>
                <label class="chip"><input type="checkbox" value="ch9"> Ch. 9 (46)</label>
                <label class="chip"><input type="checkbox" value="ch10"> Ch. 10 (52)</label>
                <label class="chip"><input type="checkbox" value="ch11"> Ch. 11 (73)</label>
                <label class="chip"><input type="checkbox" value="ch12"> Ch. 12 (144)</label>
                <label class="chip"><input type="checkbox" value="extra"> Extra (28)</label>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-group-label">Card Count</div>
                <div class="count-filter">
                    <button class="count-btn" onclick="setCount(10)">10</button>
                    <button class="count-btn" onclick="setCount(25)">25</button>
                    <button class="count-btn" onclick="setCount(50)">50</button>
                    <button class="count-btn active" onclick="setCount(0)">All</button>

        function scoreKey(card) {

        // Migrate old {streak, total} format to new {state, run, total} format
        function migrateEntry(entry) {
            if (entry.state) return entry; // already new format
            const s = entry.streak || 0;
            const t = entry.total || 0;
            if (s >= 1) return { state: 'g', run: 0, total: t };
            if (s === -1) return { state: 'a', run: 0, total: t };
            if (s <= -2) return { state: 'r', run: 0, total: t };
            if (t > 0) return { state: 'r', run: 0, total: t };
            return { state: null, run: 0, total: t };
        }

        // Scoring rules:
        // 1. Never tested + correct → green
        // 2. Green + wrong → amber
        // 3. Amber + wrong → red
        // 4. Red + 5 correct in a row → amber (run resets)
        // 5. Amber + 5 correct in a row → green (run resets)
        // Green + correct → stays green
        function updateScore(card, correct) {
            const scores = getScores();
            const key = scoreKey(card);
            const isFirstAttempt = !scores[key];
            if (!scores[key]) scores[key] = { state: null, run: 0, total: 0 };
            else scores[key] = migrateEntry(scores[key]);

            const entry = scores[key];
            const isKana = isKanaCard(card);
            const isKanji = isKanjiCard(card);

            if (correct) {
                entry.total++;
                if (!entry.state) {
                    // Rule 1: never tested → green
                    entry.state = 'g'; entry.run = 0;
                } else if (entry.state === 'g') {
                    // Already green, stay green
                    entry.run = 0;
                } else {
                    // Amber or red: count consecutive correct
                    entry.run++;
                    if (entry.run >= 5) {
                        // Rule 4/5: promote one level
                        entry.state = (entry.state === 'r') ? 'a' : 'g';
                        entry.run = 0;
                    }
                }
            } else {
                // Wrong answer
                entry.run = 0;
                if (entry.state === 'g') {
                    entry.state = 'a'; // Rule 2: green → amber
                } else if (entry.state === 'a') {
                    entry.state = 'r'; // Rule 3: amber → red
                }
                // Red stays red on wrong
            }
            saveScores(scores);

            // Sync to kana_scores for kana/katakana cards
            if (isKana) {
                const kanaScores = getKanaScores();
                const kKey = card.j;
                if (!kanaScores[kKey]) kanaScores[kKey] = { streak: 0, total: 0 };
                if (correct) {
                    kanaScores[kKey].streak = 3;
                    kanaScores[kKey].total++;
                } else {
                    if (kanaScores[kKey].streak > 0) {
                        kanaScores[kKey].streak = -1;
                    } else {
                        kanaScores[kKey].streak--;
                    }
                }
                saveKanaScores(kanaScores);
            }

            // Sync to kanji_scores for kanji cards
            if (isKanji) {
                const kanjiScores = getKanjiScores();
                const kKey = card.j;
                if (!kanjiScores[kKey]) kanjiScores[kKey] = { streak: 0, total: 0 };
                if (correct) {
                    kanjiScores[kKey].streak = 3;
                    kanjiScores[kKey].total++;
                } else {
                    if (kanjiScores[kKey].streak > 0) {
                        kanjiScores[kKey].streak = -1;
                    } else {
                        kanjiScores[kKey].streak--;
                    }
                }
                saveKanjiScores(kanjiScores);
            }

            return entry;
        }

        function getScoreColor(entry) {
            // Handle both old {streak} and new {state} formats
            if (entry && entry.state) {
                if (entry.state === 'g') return 'green';
                if (entry.state === 'a') return 'amber';
                if (entry.state === 'r') return 'red';
                return null;
            }
            // Fallback for old format
            if (entry && typeof entry.streak === 'number') {
                if (entry.streak >= 1) return 'green';
                if (entry.streak === -1) return 'amber';
                if (entry.streak <= -2) return 'red';
            }
            return null;
        }

        function getFireBadge(total) {
            if (total >= 10) {
                const tens = Math.floor(total / 10) * 10;
                return tens + '+';
            }
            return null;
        }

        // ============ FILTER TOGGLE ============
        function toggleFilters() {
            const body = document.getElementById('filter-body');
            const arrow = document.getElementById('filter-arrow');
            body.classList.toggle('collapsed');
            arrow.textContent = body.classList.contains('collapsed') ? '▶' : '▼';
        }

        // ============ MODE TOGGLE ============
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('flip-area').classList.add('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
        }

        // ============ FILTER ACTIONS ============
        function selectAll() {
            document.querySelectorAll('.filter-chips input[type="checkbox"]').forEach(c => c.checked = true);
        }

        function deselectAll() {
            document.querySelectorAll('.filter-chips input[type="checkbox"]').forEach(c => c.checked = false);
        }

        // ============ CARD COUNT ============
        function setCount(n) {
            cardLimit = n;
            document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            document.getElementById('custom-count').value = '';
        }

        function setCustomCount() {
            const val = parseInt(document.getElementById('custom-count').value);
            if (val > 0) {
                cardLimit = val;
                document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
            }
        }

        // ============ SHUFFLE ============
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // ============ FONT SIZE ============
        function getFontSize(text) {
            const len = text.length;
            if (len <= 1) return '2em';
            if (len <= 2) return '1.7em';
            if (len <= 3) return '1.4em';
            if (len <= 5) return '1.15em';
            if (len <= 7) return '0.95em';
            if (len <= 10) return '0.8em';
            return '0.7em';
        }

        // ============ START SESSION ============
        function startSession() {
            // Gather selected categories
            const checked = Array.from(document.querySelectorAll('.filter-chips input:checked')).map(c => c.value);
            if (checked.length === 0) {
                alert('Please select at least one category.');
                return;
            }

            // Auto-collapse filters
            const body = document.getElementById('filter-body');
            const arrow = document.getElementById('filter-arrow');
            if (!body.classList.contains('collapsed')) {
                body.classList.add('collapsed');
                arrow.textContent = '▶';
            }

            // Build card pool
            let pool = [];
            checked.forEach(key => {
                if (fcData[key]) {
                    pool = pool.concat(fcData[key]);
                }
            });

            // Shuffle
            pool = shuffle(pool);

            // Apply card limit
            if (cardLimit > 0 && cardLimit < pool.length) {
                pool = pool.slice(0, cardLimit);
            }

            activeCards = pool;

            if (currentMode === 'flip') {
                renderFlipCards();
            } else {
                startQuiz();
            }
        }

        // ============ FLIP MODE ============
        let currentView = 'grid';
        let singleIndex = 0;

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.toLowerCase().replace(/\s/g,'') === (view === 'grid' ? 'grid' : 'onebyone'));
            });
            // Simpler: just toggle active on the two buttons
            var btns = document.querySelectorAll('.view-btn');
            btns[0].classList.toggle('active', view === 'grid');
            btns[1].classList.toggle('active', view === 'single');

            if (view === 'grid') {
                document.getElementById('flip-grid').style.display = '';
                document.getElementById('single-card-area').style.display = 'none';
                document.getElementById('single-card-counter').style.display = 'none';
            } else {
                document.getElementById('flip-grid').style.display = 'none';
                document.getElementById('single-card-area').style.display = '';
                document.getElementById('single-card-counter').style.display = '';
                singleIndex = 0;
                renderSingleCard();
            }
        }

        function renderFlipCards() {
            document.getElementById('flip-area').classList.remove('hidden');
            document.getElementById('quiz-area').classList.add('hidden');

            // Always render the grid
            const grid = document.getElementById('flip-grid');
            grid.innerHTML = '';

            activeCards.forEach((card, i) => {
                const isKana = isKanaCard(card);

                const wrapper = document.createElement('div');
                wrapper.className = 'flip-card-wrapper';
                wrapper.onclick = function() {
                    this.querySelector('.flip-card').classList.toggle('flipped');
                };

                const fontSize = getFontSize(card.j);
                const backFontSize = getFontSize(card.e);

                wrapper.innerHTML = `
                    <div class="flip-card">
                        <div class="flip-front">
                            <div class="jp-text" style="font-size: ${fontSize}">${card.j}</div>
                            ${!isKana ? '<div class="reading-text">' + card.r + '</div>' : ''}
                            <div class="card-emoji">${card.em || '📝'}</div>
                        </div>
                        <div class="flip-back">
                            <div class="en-text" style="font-size: ${backFontSize}">${card.e}</div>
                            <div class="reading-text">${card.r}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(wrapper);
            });

            // Restore correct view state
            if (currentView === 'single') {
                document.getElementById('flip-grid').style.display = 'none';
                document.getElementById('single-card-area').style.display = '';
                document.getElementById('single-card-counter').style.display = '';
                singleIndex = 0;
                renderSingleCard();
            } else {
                document.getElementById('flip-grid').style.display = '';
                document.getElementById('single-card-area').style.display = 'none';
                document.getElementById('single-card-counter').style.display = 'none';
            }

            // Set button states
            var btns = document.querySelectorAll('.view-btn');
            btns[0].classList.toggle('active', currentView === 'grid');
            btns[1].classList.toggle('active', currentView === 'single');
        }

        function renderSingleCard() {
            if (activeCards.length === 0) return;
            var card = activeCards[singleIndex];
            var isKana = isKanaCard(card);
            var container = document.getElementById('single-card-container');

            container.onclick = function() {
                var fc = this.querySelector('.flip-card');
                if (fc) fc.classList.toggle('flipped');
            };

            container.innerHTML = '<div class="flip-card">'
                + '<div class="flip-front">'
                + '<div class="jp-text">' + card.j + '</div>'
                + (!isKana ? '<div class="reading-text">' + card.r + '</div>' : '')
                + '<div class="card-emoji">' + (card.em || '📝') + '</div>'
                + '</div>'
                + '<div class="flip-back">'
                + '<div class="en-text">' + card.e + '</div>'
                + '<div class="reading-text">' + card.r + '</div>'
                + '</div>'
                + '</div>';

            // Update counter
            document.getElementById('single-card-counter').textContent = (singleIndex + 1) + ' / ' + activeCards.length;

            // Update arrow states
            document.getElementById('prev-arrow').disabled = (singleIndex === 0);
            document.getElementById('next-arrow').disabled = (singleIndex === activeCards.length - 1);
        }

        function navigateCard(dir) {
            var newIndex = singleIndex + dir;
            if (newIndex < 0 || newIndex >= activeCards.length) return;
            singleIndex = newIndex;
            renderSingleCard();
        }

        // ============ QUIZ MODE ============
        // Question types: 'mc' = multiple choice, 'type_meaning' = type the English, 'type_romaji' = type the romaji
        let currentQuestionType = 'mc';
        let enabledQuizTypes = ['mc', 'type_meaning', 'type_romaji'];

        function loadQuizTypes() {
            enabledQuizTypes = Array.from(document.querySelectorAll('#quiz-type-filter input:checked')).map(function(c) { return c.value; });
            if (enabledQuizTypes.length === 0) enabledQuizTypes = ['mc']; // fallback
        }

        function pickQuestionType() {
            return enabledQuizTypes[Math.floor(Math.random() * enabledQuizTypes.length)];
        }

        function startQuiz() {
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('flip-area').classList.add('hidden');
            loadQuizTypes();
            quizIndex = 0;
            quizCorrect = 0;
            quizWrong = 0;
            renderQuizCard();
        }

        function buildScoreHTML(card) {
            const scores = getScores();
            const scoreData = scores[scoreKey(card)];
            let html = '';
            if (scoreData) {
                const color = getScoreColor(scoreData);
                if (color) html += '<span class="score-dot ' + color + '"></span>';
                const fire = getFireBadge(scoreData.total);
                if (fire) html += ' 🔥 <span class="fire-badge">' + fire + '</span>';
            }
            return html;
        }

        function renderQuizCard() {
            const container = document.getElementById('quiz-card-container');

            if (quizIndex >= activeCards.length) {
                renderQuizSummary();
                return;
            }

            const total = activeCards.length;
            document.getElementById('quiz-progress-text').textContent = (quizIndex + 1) + ' / ' + total;
            document.getElementById('quiz-progress-fill').style.width = ((quizIndex / total) * 100) + '%';
            document.getElementById('quiz-score-text').textContent = '✓ ' + quizCorrect + '  ✗ ' + quizWrong;

            const card = activeCards[quizIndex];
            currentQuestionType = pickQuestionType();
            const scoreHTML = buildScoreHTML(card);
            const promptSize = getFontSize(card.j).replace('em', '') * 1.5 + 'em';

            if (currentQuestionType === 'mc') {
                // Multiple choice — use romaji distractors for kana/katakana, meanings for vocab/kanji
                const cardIsKana = isKanaCard(card);
                const cardIsKanji = isKanjiCard(card);
                let allAnswers = [];
                let correctAns = cardIsKana ? card.r : card.e;

                if (cardIsKana) {
                    // Pull romaji readings from all kana categories as distractors
                    kanaCategories.forEach(function(k) {
                        if (fcData[k]) fcData[k].forEach(function(c) {
                            if (c.r !== card.r) allAnswers.push(c.r);
                        });
                    });
                } else if (cardIsKanji) {
                    // Kanji: pull meanings from all kanji categories
                    kanjiCategories.forEach(function(k) {
                        if (fcData[k]) fcData[k].forEach(function(c) {
                            if (c.e !== card.e) allAnswers.push(c.e);
                        });
                    });
                } else {
                    // Vocab: scope distractors to the card's chapter + all earlier chapters
                    // Find which chapter contains this card
                    let cardChapter = null;
                    for (let n = 1; n <= 12; n++) {
                        const key = 'ch' + n;
                        if (fcData[key] && fcData[key].includes(card)) {
                            cardChapter = n;
                            break;
                        }
                    }

                    if (cardChapter !== null) {
                        // Pull distractors from ch1 through cardChapter
                        for (let n = 1; n <= cardChapter; n++) {
                            const arr = fcData['ch' + n];
                            if (arr) arr.forEach(function(c) {
                                if (c.e !== card.e) allAnswers.push(c.e);
                            });
                        }
                    } else {
                        // Fallback (e.g. extra vocab) — pull from all vocab chapters + extra
                        for (let n = 1; n <= 12; n++) {
                            const arr = fcData['ch' + n];
                            if (arr) arr.forEach(function(c) {
                                if (c.e !== card.e) allAnswers.push(c.e);
                            });
                        }
                        if (fcData.extra) fcData.extra.forEach(function(c) {
                            if (c.e !== card.e) allAnswers.push(c.e);
                        });
                    }
                }
                allAnswers = shuffle([...new Set(allAnswers)]).slice(0, 3);
                allAnswers.push(correctAns);
                allAnswers = shuffle(allAnswers);

                container.innerHTML = '<div class="quiz-card">'
                    + '<div class="quiz-prompt" style="font-size:' + promptSize + '">' + card.j + '</div>'
                    + (scoreHTML ? '<div class="score-indicator">' + scoreHTML + '</div>' : '')
                    + '<div class="quiz-options">'
                    + allAnswers.map(function(a) {
                        return '<button class="quiz-option" onclick="checkMC(this,\'' + a.replace(/'/g, "\\'") + '\',\'' + correctAns.replace(/'/g, "\\'") + '\')">' + a + '</button>';
                    }).join('')
                    + '</div></div>';

            } else if (currentQuestionType === 'type_meaning') {
                // Type the English meaning
                container.innerHTML = '<div class="quiz-card">'
                    + '<div class="quiz-prompt" style="font-size:' + promptSize + '">' + card.j + '</div>'
                    + (scoreHTML ? '<div class="score-indicator">' + scoreHTML + '</div>' : '')
                    + '<div class="quiz-type-area">'
                    + '<div class="quiz-type-label">Type the meaning in English:</div>'
                    + '<input class="quiz-type-input" id="type-input" autocomplete="off" autofocus>'
                    + '<br><button class="quiz-submit-btn" onclick="checkTyped()">Submit</button>'
                    + '<div class="quiz-correct-answer hidden" id="correct-reveal"></div>'
                    + '</div></div>';
                setTimeout(function() {
                    var inp = document.getElementById('type-input');
                    if (inp) { inp.focus(); inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkTyped(); }); }
                }, 50);

            } else {
                // Type the romaji
                container.innerHTML = '<div class="quiz-card">'
                    + '<div class="quiz-prompt" style="font-size:' + promptSize + '">' + card.j + '</div>'
                    + (scoreHTML ? '<div class="score-indicator">' + scoreHTML + '</div>' : '')
                    + '<div class="quiz-type-area">'
                    + '<div class="quiz-type-label">Type the romaji reading:</div>'
                    + '<input class="quiz-type-input" id="type-input" autocomplete="off" autofocus>'
                    + '<br><button class="quiz-submit-btn" onclick="checkTyped()">Submit</button>'
                    + '<div class="quiz-correct-answer hidden" id="correct-reveal"></div>'
                    + '</div></div>';
                setTimeout(function() {
                    var inp = document.getElementById('type-input');
                    if (inp) { inp.focus(); inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkTyped(); }); }
                }, 50);
            }

            quizAnswered = false;
        }

        // Multiple choice handler
        function checkMC(btn, selected, correct) {
            if (quizAnswered) return;
            quizAnswered = true;

            const card = activeCards[quizIndex];
            const isCorrect = selected === correct;

            if (isCorrect) {
                btn.classList.add('correct');
                quizCorrect++;
            } else {
                btn.classList.add('wrong');
                quizWrong++;
                document.querySelectorAll('.quiz-option').forEach(function(b) {
                    if (b.textContent === correct) b.classList.add('correct');
                });
            }

            document.querySelectorAll('.quiz-option').forEach(function(b) { b.classList.add('disabled'); });

            finalizeAnswer(card, isCorrect);
        }

        // Typed answer handler
        function checkTyped() {
            if (quizAnswered) return;
            quizAnswered = true;

            const card = activeCards[quizIndex];
            const input = document.getElementById('type-input');
            const reveal = document.getElementById('correct-reveal');
            const userAnswer = input.value.trim().toLowerCase();

            let correctAnswer;
            if (currentQuestionType === 'type_meaning') {
                correctAnswer = card.e.toLowerCase();
            } else {
                correctAnswer = card.r.toLowerCase();
            }

            // Flexible matching: strip parentheses content, accept any slash-separated option
            const correctOptions = correctAnswer.replace(/\(.*?\)/g, '').split('/').map(function(s) { return s.trim(); });
            const isCorrect = correctOptions.some(function(opt) { return userAnswer === opt; })
                || userAnswer === correctAnswer.replace(/\(.*?\)/g, '').trim();

            if (isCorrect) {
                input.classList.add('correct');
                quizCorrect++;
            } else {
                input.classList.add('wrong');
                quizWrong++;
                reveal.textContent = 'Correct answer: ' + (currentQuestionType === 'type_meaning' ? card.e : card.r);
                reveal.classList.remove('hidden');
            }

            input.disabled = true;
            document.querySelector('.quiz-submit-btn').disabled = true;

            finalizeAnswer(card, isCorrect);
        }

        // Shared post-answer logic
        function finalizeAnswer(card, isCorrect) {
            const scoreData = updateScore(card, isCorrect);

            // Update score indicator
            const scoreIndicator = document.querySelector('.score-indicator');
            let html = '';
            const color = getScoreColor(scoreData);
            if (color) html += '<span class="score-dot ' + color + '"></span>';
            const fire = getFireBadge(scoreData.total);
            if (fire) html += ' 🔥 <span class="fire-badge">' + fire + '</span>';

            if (scoreIndicator) {
                scoreIndicator.innerHTML = html;
            } else if (html) {
                const div = document.createElement('div');
                div.className = 'score-indicator';
                div.innerHTML = html;
                document.querySelector('.quiz-prompt').after(div);
            }

            document.getElementById('quiz-score-text').textContent = '✓ ' + quizCorrect + '  ✗ ' + quizWrong;

            setTimeout(function() {
                quizIndex++;
                renderQuizCard();
            }, 1500);
        }

        function renderQuizSummary() {
            const total = activeCards.length;
            const pct = Math.round((quizCorrect / total) * 100);

            document.getElementById('quiz-progress-fill').style.width = '100%';
            document.getElementById('quiz-progress-text').textContent = total + ' / ' + total;
            document.getElementById('quiz-score-text').textContent = '✓ ' + quizCorrect + '  ✗ ' + quizWrong;

            document.getElementById('quiz-card-container').innerHTML = `
                <div class="quiz-summary">
                    <h2>Session Complete!</h2>
                    <div class="summary-stats">
                        <div class="stat-box stat-correct">
                            <div class="stat-number">${quizCorrect}</div>
                            <div class="stat-label">Correct</div>
                        </div>
                        <div class="stat-box stat-wrong">
                            <div class="stat-number">${quizWrong}</div>
                            <div class="stat-label">Wrong</div>
                        </div>
                        <div class="stat-box stat-percent">
                            <div class="stat-number">${pct}%</div>
                            <div class="stat-label">Score</div>
                        </div>
                    </div>
                    <button class="summary-btn" onclick="startSession()">Practice Again</button>
                    <button class="summary-btn secondary" onclick="resetToFilters()">Change Filters</button>
                </div>
            `;
        }

        function resetToFilters() {
            document.getElementById('flip-area').classList.add('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
            // Expand filters
            const body = document.getElementById('filter-body');
            const arrow = document.getElementById('filter-arrow');
            body.classList.remove('collapsed');
            arrow.textContent = '▼';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
